<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>TTS Free — Truyện Audio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🎧</span>
          <div>
            <h1>TTS Free</h1>
            <p>Truyện audio không giới hạn</p>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <label class="label" for="textInput">Nội dung truyện</label>
        <textarea
          id="textInput"
          placeholder="Dán hoặc nhập nội dung truyện tại đây...&#10;&#10;Không giới hạn ký tự — hệ thống tự chia đoạn và ghép audio."
          rows="8"
          autofocus
        ></textarea>
        <div class="char-count"><span id="charCount">0</span> ký tự</div>
      </section>

      <section class="card">
        <label class="label" for="voiceSearch">Giọng đọc</label>
        <input type="search" id="voiceSearch" placeholder="Tìm giọng (VD: Hoài My, Nam)...">
        <select id="voiceSelect" size="1"></select>
      </section>

      <section class="card sliders">
        <div class="slider-row">
          <div class="slider-label">
            <span>Tốc độ</span>
            <span id="rateVal" class="slider-val">Bình thường</span>
          </div>
          <input type="range" id="rateSlider" min="-50" max="50" value="0" step="5">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Cao độ</span>
            <span id="pitchVal" class="slider-val">0 Hz</span>
          </div>
          <input type="range" id="pitchSlider" min="-20" max="20" value="0" step="2">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Âm lượng</span>
            <span id="volumeVal" class="slider-val">100%</span>
          </div>
          <input type="range" id="volumeSlider" min="-20" max="20" value="0" step="5">
        </div>
      </section>

      <button id="generateBtn" class="btn-primary" type="button">
        <span class="btn-text">Tạo audio</span>
        <span class="btn-loader hidden"></span>
      </button>

      <div id="progressBox" class="progress-box hidden">
        <div class="progress-info">
          <span id="progressText">Đang xử lý...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div id="errorBox" class="error-box hidden"></div>
    </main>

    <footer id="playerBar" class="player-bar hidden">
      <div class="player-inner">
        <audio id="audioPlayer" controls playsinline preload="metadata"></audio>
        <a id="downloadBtn" class="btn-download" href="#" download="truyen-audio.mp3">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Tải MP3
        </a>
      </div>
    </footer>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
