<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffd6e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TTS Bảo Ngân">
  <title>TTS Bảo Ngân ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-badge" aria-hidden="true">✨</div>
          <div class="logo-text">
            <p class="logo-sub">Dành riêng cho</p>
            <h1>TTS Bảo Ngân</h1>
            <p class="logo-tag">Nghe truyện, nghe điều hay ✿</p>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="card card-story">
        <div class="card-head">
          <span class="card-icon">📖</span>
          <label class="label" for="textInput">Nội dung truyện</label>
        </div>
        <textarea
          id="textInput"
          placeholder="Dán truyện vào đây nha~&#10;&#10;Viết bao nhiêu cũng được, app tự đọc hết cho Bảo Ngân ♡"
          rows="8"
          autofocus
        ></textarea>
        <div class="char-count">
          <span class="char-dot"></span>
          <span id="charCount">0</span> ký tự
        </div>
      </section>

      <section class="card card-voice">
        <div class="card-head">
          <span class="card-icon">🎀</span>
          <label class="label" for="voiceSelect">Chọn giọng đọc</label>
        </div>
        <input type="search" id="voiceSearch" class="input-soft" placeholder="Tìm giọng (VD: Hoài My)...">
        <select id="voiceSelect" class="select-soft"></select>
      </section>

      <details class="card card-settings" id="settingsPanel">
        <summary class="settings-toggle">
          <span class="card-icon">🌸</span>
          <span>Tùy chỉnh giọng đọc</span>
          <span class="chevron">›</span>
        </summary>
        <div class="sliders">
          <div class="slider-row">
            <div class="slider-label">
              <span>🐢 Tốc độ</span>
              <span id="rateVal" class="slider-val">Bình thường</span>
            </div>
            <input type="range" id="rateSlider" min="-50" max="50" value="0" step="5">
          </div>
          <div class="slider-row">
            <div class="slider-label">
              <span>🎵 Cao độ</span>
              <span id="pitchVal" class="slider-val">0 Hz</span>
            </div>
            <input type="range" id="pitchSlider" min="-20" max="20" value="0" step="2">
          </div>
          <div class="slider-row">
            <div class="slider-label">
              <span>🔊 Âm lượng</span>
              <span id="volumeVal" class="slider-val">100%</span>
            </div>
            <input type="range" id="volumeSlider" min="-20" max="20" value="0" step="5">
          </div>
        </div>
      </details>

      <button id="generateBtn" class="btn-primary" type="button">
        <span class="btn-sparkle">♡</span>
        <span class="btn-text">Tạo truyện audio</span>
        <span class="btn-loader hidden"></span>
      </button>

      <div id="progressBox" class="progress-box hidden">
        <div class="progress-emoji" id="progressEmoji">🌷</div>
        <div class="progress-info">
          <span id="progressText">Đang chuẩn bị...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div id="successBox" class="success-box hidden">
        <span>🎉</span> Xong rồi nha! Nghe thử đi ~
      </div>

      <div id="errorBox" class="error-box hidden"></div>
    </main>

    <footer id="playerBar" class="player-bar hidden">
      <div class="player-inner">
        <p class="player-title">♪ Đang phát cho Bảo Ngân</p>
        <audio id="audioPlayer" controls playsinline preload="metadata"></audio>
        <a id="downloadBtn" class="btn-download" href="#" download="bao-ngan-truyen.mp3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Lưu MP3 về máy
        </a>
      </div>
    </footer>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
